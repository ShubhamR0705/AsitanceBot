services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assistancebot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assistancebot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: AssistIQ
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/assistancebot
      SECRET_KEY: change-this-secret-before-deployment
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8080,http://localhost:8088
      AUTO_CREATE_TABLES: "true"
      SEED_DEMO_DATA: "true"
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-https://aaif-codebridge-llm.cognitiveservices.azure.com/}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-codeBridge-gtp5-chat}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-01-01-preview}
      AZURE_OPENAI_TIMEOUT_SECONDS: ${AZURE_OPENAI_TIMEOUT_SECONDS:-15}
      AZURE_OPENAI_MAX_COMPLETION_TOKENS: ${AZURE_OPENAI_MAX_COMPLETION_TOKENS:-700}
      AZURE_OPENAI_TEMPERATURE: ${AZURE_OPENAI_TEMPERATURE:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "8088:80"
    depends_on:
      - backend

volumes:
  postgres_data:
